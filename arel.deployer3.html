  document.getElementById('btn').disabled=true;
  setS('loading','⏳ Yükleniyor...');
  const h={'Authorization':'token '+tok,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  try{
    const g=await fetch('https://api.github.com/repos/Burakisa35/arel/contents/index.html?ref=main',{headers:h});
    let sha=null;if(g.ok){const d=await g.json();sha=d.sha;}
    const body={message:'Deploy v0.6.0 — UX + contextual WA + lokasyon',content:B64,branch:'main'};
    if(sha)body.sha=sha;
    const r=await fetch('https://api.github.com/repos/Burakisa35/arel/contents/index.html',{method:'PUT',headers:h,body:JSON.stringify(body)});
    if(r.ok){setS('success','✅ Yayınlandı! Vercel 1-2 dk içinde günceller.');}
    else{const e=await r.json();setS('error','Hata: '+(e.message||r.status));}
  }catch(e){setS('error','Bağlantı hatası: '+e.message);}
  document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
