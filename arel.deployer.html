function setStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

async function deploy() {
  const token = tokenInput.value.trim();
  if (!token) { setStatus('error', 'Token girilmedi.'); return; }

  localStorage.setItem('arel_gh_token', token);
  document.getElementById('deployBtn').disabled = true;
  setStatus('loading', '⏳ Mevcut dosya alınıyor...');

  const headers = {
    'Authorization': 'token ' + token,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };

  try {
    // 1. Mevcut SHA al
    const getRes = await fetch(
      'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + FILE_PATH + '?ref=' + BRANCH,
      { headers }
    );

    let sha = null;
    if (getRes.ok) {
      const data = await getRes.json();
      sha = data.sha;
    }

    setStatus('loading', '⏳ GitHub\'a yükleniyor...');

    // 2. Dosyayı yükle
    const body = {
      message: 'Deploy v0.2.0 — ' + new Date().toLocaleString('tr-TR'),
      content: CONTENT_B64,
      branch: BRANCH
    };
    if (sha) body.sha = sha;

    const putRes = await fetch(
      'https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + FILE_PATH,
      { method: 'PUT', headers, body: JSON.stringify(body) }
    );

    if (putRes.ok) {
      setStatus('success', '✅ Başarılı! Vercel 1-2 dakikada yayınlar. → arel-phi.vercel.app');
    } else {
      const err = await putRes.json();
      setStatus('error', 'Hata: ' + (err.message || putRes.status));
    }
  } catch (e) {
    setStatus('error', 'Bağlantı hatası: ' + e.message);
  }

  document.getElementById('deployBtn').disabled = false;
}
</script>
