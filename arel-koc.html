<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arel Koç</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0c0c0c;color:#e5e5e5;font-family:'Barlow',sans-serif;height:100vh;display:flex;flex-direction:column;}
  header{padding:14px 20px;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;gap:12px;background:#0c0c0c;}
  .logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;letter-spacing:0.08em;color:#fff;}
  .logo span{color:#f59e0b;}
  .koc-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#f59e0b;background:#1a1200;border:1px solid #92400e;border-radius:3px;padding:3px 8px;}
  .chat-alan{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;}
  .mesaj{max-width:85%;line-height:1.65;font-size:14px;}
  .mesaj.koc{align-self:flex-start;background:#141414;border:1px solid #2a2a2a;border-radius:2px 12px 12px 12px;padding:14px 16px;}
  .mesaj.kullanici{align-self:flex-end;background:#1a1200;border:1px solid #92400e;border-radius:12px 2px 12px 12px;padding:14px 16px;color:#e5e5e5;}
  .mesaj-etiket{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#737373;margin-bottom:6px;}
  .mesaj.koc .mesaj-etiket{color:#f59e0b;}
  .input-alan{border-top:1px solid #2a2a2a;padding:14px 16px;display:flex;gap:10px;background:#0c0c0c;}
  textarea{flex:1;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;color:#e5e5e5;font-family:'Barlow',sans-serif;font-size:14px;resize:none;outline:none;line-height:1.5;max-height:120px;}
  textarea:focus{border-color:#f59e0b;}
  button.gonder{background:#f59e0b;border:none;border-radius:8px;padding:12px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:#000;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;}
  button.gonder:hover{opacity:0.85;}
  button.gonder:disabled{opacity:0.3;cursor:not-allowed;}
  .yukleniyor{display:flex;gap:4px;align-items:center;padding:4px 0;}
  .yukleniyor span{width:6px;height:6px;background:#f59e0b;border-radius:50%;animation:bounce 1.2s infinite;}
  .yukleniyor span:nth-child(2){animation-delay:0.2s;}
  .yukleniyor span:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
  .oneri-butonlar{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
  .oneri-btn{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:20px;padding:6px 14px;font-size:12px;color:#e5e5e5;cursor:pointer;transition:border-color 0.2s,color 0.2s;font-family:'Barlow',sans-serif;}
  .oneri-btn:hover{border-color:#f59e0b;color:#f59e0b;}
</style>
</head>
<body>

<header>
  <div class="logo">AR<span>·</span>EL</div>
  <div class="koc-badge">⚡ Koç</div>
</header>

<div class="chat-alan" id="chat"></div>

<div class="input-alan">
  <textarea id="girdi" placeholder="Sormak istediğini yaz..." rows="1" onkeydown="enterGonder(event)" oninput="boyutAyarla(this)"></textarea>
  <button class="gonder" id="gonder-btn" onclick="gonder()">Sor →</button>
</div>

<script>
var gecmis = [];
var SISTEM = `Sen Burak İsa Sivacı'nın kişisel iş koçusun. Burak, Kemalpaşa/Armutlu İzmir'de solo saha teknisyeni. Elektrik tesisatı, Hikvision kamera (Partner Pro sertifikalı), uydu/anten, ağ altyapısı, kapı otomasyonu yapıyor. Müşteri markası: Arel. Uzun vadeli hedef: Eylül 2026'da TEHAŞ adında bir teknik servis şirketi kurmak, kendi bünyesinde teknisyen istihdam etmek.

Senin görevin: Burak ne söylerse söylesin, konuyu onun bilmediği açılardan, sektör uzmanı perspektifiyle analiz et. Somut, direkt, Türkçe cevap ver. Motivasyon dili, dolgu cümle, övgü yok. Önce sonucu söyle, sonra açıkla. Burak'ın büyük çerçevede düşünme ama tamamlamadan yenisine geçme eğilimini bil — gerektiğinde bunu nazikçe hatırlat. Finansal gerçekler, müşteri psikolojisi, saha operasyonları, dijital marka konularında uzmansın.`;

function ekle(rol, icerik, yukleniyor) {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'mesaj ' + (rol === 'koc' ? 'koc' : 'kullanici');
  var etiket = document.createElement('div');
  etiket.className = 'mesaj-etiket';
  etiket.textContent = rol === 'koc' ? 'AREL KOÇ' : 'SEN';
  div.appendChild(etiket);
  if (yukleniyor) {
    var yk = document.createElement('div');
    yk.className = 'yukleniyor';
    yk.innerHTML = '<span></span><span></span><span></span>';
    yk.id = 'yukleniyor-el';
    div.appendChild(yk);
  } else {
    var p = document.createElement('div');
    p.innerHTML = icerik.replace(/\n/g, '<br>');
    div.appendChild(p);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function oneriGoster() {
  var chat = document.getElementById('chat');
  var div = document.createElement('div');
  div.className = 'oneri-butonlar';
  var oneriler = [
    'Armut profilimdeki fiyatları nasıl ayarlamalıyım?',
    'Müşteri yorumu nasıl isteyeyim?',
    'TEHAŞ için önce ne yapmalıyım?',
    'Arel sitesinde eksik ne var?',
  ];
  oneriler.forEach(function(o) {
    var btn = document.createElement('button');
    btn.className = 'oneri-btn';
    btn.textContent = o;
    btn.onclick = function() {
      document.getElementById('girdi').value = o;
      div.remove();
      gonder();
    };
    div.appendChild(btn);
  });
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function gonder() {
  var girdi = document.getElementById('girdi');
  var metin = girdi.value.trim();
  if (!metin) return;
  girdi.value = '';
  boyutAyarla(girdi);
  document.getElementById('gonder-btn').disabled = true;

  ekle('kullanici', metin);
  gecmis.push({ role: 'user', content: metin });

  var yukDiv = ekle('koc', '', true);

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SISTEM,
        messages: gecmis,
      })
    });
    var data = await res.json();
    var cevap = data.content[0].text;
    gecmis.push({ role: 'assistant', content: cevap });

    var yk = document.getElementById('yukleniyor-el');
    if (yk) {
      var p = document.createElement('div');
      p.innerHTML = cevap.replace(/\n/g, '<br>');
      yk.replaceWith(p);
    }
  } catch(e) {
    var yk = document.getElementById('yukleniyor-el');
    if (yk) yk.replaceWith(document.createTextNode('Bağlantı hatası.'));
  }

  document.getElementById('gonder-btn').disabled = false;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function enterGonder(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); gonder(); }
}

function boyutAyarla(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Açılış mesajı
window.onload = function() {
  ekle('koc', 'Merhaba Burak. Ne üzerinde konuşacağız?');
  oneriGoster();
};
</script>

</body>
</html>
