<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEHAŞ</title>
  <style>
    /* Genel stiller */
    body {
      margin: 0;
      padding: 0;
      background-color: #121212; /* Koyu arka plan */
      color: #ffffff; /* Beyaz metin */
      font-family: "Arial", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh; /* Ekranın tamamını kaplama */
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .container {
      text-align: center;
      width: 100%;
    }

    .logo {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 2rem;
    }

    .menu, .sub-menu, .problem-menu {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .menu > button, .sub-menu > button, .problem-menu > button {
      background: none;
      color: #ffffff;
      font-size: 1.2rem;
      padding: 1rem 0;
      border: 1px solid #ffffff;
      cursor: pointer;
      border-radius: 0.5rem;
      transition: all 200ms ease-in-out;
    }

    .menu > button:hover, .sub-menu > button:hover, .problem-menu > button:hover {
      border-color: #2196F3; /* Mavi vurgu */
    }

    .menu > button:active, .sub-menu > button:active, .problem-menu > button:active {
      transform: scale(0.98); /* Hafif küçülme animasyonu */
    }

    .hidden {
      display: none;
    }

    .back-button {
      margin-top: 2rem;
      color: #ffffff;
      background: none;
      border: 1px solid #ffffff;
      font-size: 1rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 200ms ease-in-out;
    }
    .back-button:hover {
      border-color: #2196F3;
    }
    .intentional-space {
      height: 40%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">TEHAŞ</div>
    <div class="menu" id="mainMenu">
      <button onclick="showSubMenu('konut')">KONUT</button>
      <button onclick="showSubMenu('isletme')">İŞLETME</button>
      <button onclick="showSubMenu('endustri')">ENDÜSTRİ</button>
    </div>

    <div class="sub-menu hidden" id="subMenu">
      <div id="konut" class="hidden">
        <button onclick="showProblems('KONUT / Bireysel')">Bireysel</button>
        <button onclick="showProblems('KONUT / Apartman Yönetimi')">Apartman Yönetimi</button>
        <button onclick="showProblems('KONUT / Site Yönetimi')">Site Yönetimi</button>
        <button onclick="showProblems('KONUT / Mülk Sahibi')">Mülk Sahibi</button>
        <button onclick="showProblems('KONUT / Müteahhit')">Müteahhit</button>
      </div>
      <div id="isletme" class="hidden">
        <button onclick="showProblems('İŞLETME / Gıda & Ağırlama')">Gıda & Ağırlama</button>
        <button onclick="showProblems('İŞLETME / Perakende')">Perakende</button>
        <button onclick="showProblems('İŞLETME / Ofis & Yönetim')">Ofis & Yönetim</button>
        <button onclick="showProblems('İŞLETME / Sağlık & Eğitim')">Sağlık & Eğitim</button>
        <button onclick="showProblems('İŞLETME / Teknik & Otomotiv')">Teknik & Otomotiv</button>
        <button onclick="showProblems('İŞLETME / Lojistik & Ulaşım')">Lojistik & Ulaşım</button>
      </div>
      <div id="endustri" class="hidden">
        <button onclick="showProblems('ENDÜSTRİ / Metal & Makine')">Metal & Makine</button>
        <button onclick="showProblems('ENDÜSTRİ / Gıda Sanayi')">Gıda Sanayi</button>
        <button onclick="showProblems('ENDÜSTRİ / Kimya & Plastik')">Kimya & Plastik</button>
        <button onclick="showProblems('ENDÜSTRİ / Depolama')">Depolama</button>
        <button onclick="showProblems('ENDÜSTRİ / Üretim')">Üretim</button>
        <button onclick="showProblems('ENDÜSTRİ / Atölye')">Atölye</button>
      </div>
      <button class="back-button" onclick="goBackToMain()">Geri</button>
    </div>

    <div class="problem-menu hidden" id="problemMenu">
      <button onclick="openWhatsApp('Kamera')">Kamera</button>
      <button onclick="openWhatsApp('Elektrik')">Elektrik</button>
      <button onclick="openWhatsApp('Ağ')">Ağ</button>
      <button onclick="openWhatsApp('Uydu / Sinyal')">Uydu / Sinyal</button>
      <button onclick="openWhatsApp('Motor / Otomasyon')">Motor / Otomasyon</button>
      <button class="back-button" onclick="goBackToSubMenu()">Geri</button>
    </div>
  </div>

  <script>
    let selectedSegment = '';

    function showSubMenu(segment) {
      selectedSegment = segment.toUpperCase();
      document.getElementById('mainMenu').classList.add('hidden');
      document.getElementById('subMenu').classList.remove('hidden');
      document.getElementById(segment).classList.remove('hidden');
    }

    function goBackToMain() {
      document.querySelectorAll('.sub-menu > div').forEach(div => div.classList.add('hidden'));
      document.getElementById('subMenu').classList.add('hidden');
      document.getElementById('mainMenu').classList.remove('hidden');
    }

    function showProblems(segment) {
      selectedSegment = segment;
      document.getElementById('subMenu').classList.add('hidden');
      document.getElementById('problemMenu').classList.remove('hidden');
    }

    function goBackToSubMenu() {
      document.getElementById('problemMenu').classList.add('hidden');
      document.getElementById(selectedSegment.split(' / ')[0].toLowerCase()).classList.remove('hidden');
      document.getElementById('subMenu').classList.remove('hidden');
    }

    function openWhatsApp(problem) {
      const message = `Merhaba, ${selectedSegment} için ${problem} sorunu yaşıyorum. Belirtiyi birlikte netleştirebilir miyiz?`;
      window.open(`https://wa.me/905367807059?text=${encodeURIComponent(message)}`, '_blank');
    }
  </script>
</body>
</html>
