/* ── YILDIZ TUVALI ──────────────────────────────────── */
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let W, H, stars = [];

  function resize(){
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }

  function init(){
    resize();
    stars = Array.from({length:120}, ()=>({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*0.8+0.2,
      a: Math.random(), da: (Math.random()-0.5)*0.003,
    }));
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.a = Math.max(0.05, Math.min(1, s.a+s.da));
      if(s.a<=0.05||s.a>=1) s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${s.a*0.5})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init(); draw();
})();

  {
    id:"sinyal", label:"Sinyal / Bağlantı", ikon:"📡", sistem:"Sinyal/Ağ",
    altlar:["TV sinyali yok","Bazı kanallar yok","IPTV / Smart TV donuyor","Kamera telefondan izlenmiyor","İnternet / Wi-Fi kopuyor","Uzak noktada bağlantı gerekiyor"],
    baglamlar:[
      {soru:"Binada ortak anten sistemi var mı?", sec:["Evet","Hayır","Emin değilim"]},
    ],
    kok(a,b){
      if(a==="TV sinyali yok"&&b[0]==="Evet") return "Ortak dağıtım sistemi arızası ihtimali";
      if(a==="TV sinyali yok") return "Anten / sinyal kaynağı / kablo zayıflaması ihtimali";
      if(a==="Bazı kanallar yok") return "Sinyal yönü veya kaynak sorunu ihtimali";
      if(a==="Kamera telefondan izlenmiyor") return "Uzak erişim / bağlantı noktası ihtimali";
      if(a==="IPTV / Smart TV donuyor") return "İnternet hızı veya sinyal kalitesi";
      return "Sinyal / bağlantı genel sorun";
    }
  },
];

/* ── STATE ──────────────────────────────────────────── */
let S = {faz:"kat", katId:null, alt:null, bc:[], bolge:null, acil:null, talepNo:"", saat:""};

function katObj(){ return KAT.find(k=>k.id===S.katId); }
function bolgeObj(){ return BOLGE.find(b=>b.kod===S.bolge); }
function acilObj(){ return ACILIYET.find(a=>a.id===S.acil); }

function fazSirasi(){
  const k = katObj();
  const s = ["kat","alt"];
  if(k?.baglamlar?.length>=1) s.push("bag0");
  if(k?.baglamlar?.length>=2) s.push("bag1");
  s.push("bolge","acil","ozet");
  return s;
}

function sonrakiFaz(f){ const s=fazSirasi(); return s[s.indexOf(f)+1]||"ozet"; }
function oncekiFaz(f){ const s=fazSirasi(); const i=s.indexOf(f); return i>0?s[i-1]:null; }

function progressPct(){
  const s=fazSirasi(); const i=s.indexOf(S.faz);
  return i<0?0:Math.round(((i+1)/(s.length-1))*100);
}

function talepNoUret(){
  const n=new Date();
  return `TH-${String(n.getFullYear()).slice(2)}${String(n.getMonth()+1).padStart(2,"0")}${String(n.getDate()).padStart(2,"0")}-${Math.floor(100+Math.random()*900)}`;
}

function saatFmt(d){ return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }

function kokNeden(){ const k=katObj(); return k?.kok?.(S.alt,S.bc)||""; }

function sheetsRow(){
  const k=katObj(),b=bolgeObj(),a=acilObj();
  return [S.talepNo,S.saat,b?`${b.kod}/${b.label}`:"",k?.label||"",S.alt||"",S.bc.filter(Boolean).join("|"),k?.sistem||"",a?.label||"",kokNeden(),"Bekliyor","",""].join("\t");
}

function waMsg(){
  const k=katObj(),b=bolgeObj(),a=acilObj();
  return encodeURIComponent([`Arel Talep`,`No: ${S.talepNo}`,`Sorun: ${k?.label||""}${S.alt?" — "+S.alt:""}`,`Bölge: ${b?b.kod+" / "+b.label:""}`,`Aciliyet: ${a?.label||""}`,`Saat: ${S.saat}`].join("\n"));
}

/* ── NAVİGASYON ─────────────────────────────────────── */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>{ s.classList.add('hidden'); s.classList.remove('slide-in'); });
  const el = document.getElementById(id);
  if(el){ el.classList.remove('hidden'); el.classList.add('slide-in'); }
}

function kayitBaslat(){
  const now = new Date();
  S = {faz:"kat", katId:null, alt:null, bc:[], bolge:null, acil:null, talepNo:talepNoUret(), saat:saatFmt(now)};
  showScreen('screen-kayit');
  render();
}

/* ── RENDER ─────────────────────────────────────────── */
function render(){
  const el = document.getElementById('k-inner');
  switch(S.faz){
    case "kat":   el.innerHTML = rKat(); break;
    case "alt":   el.innerHTML = rAlt(); break;
    case "bag0":  el.innerHTML = rBag(0); break;
    case "bag1":  el.innerHTML = rBag(1); break;
    case "bolge": el.innerHTML = rBolge(); break;
    case "acil":  el.innerHTML = rAcil(); break;
    case "ozet":  el.innerHTML = rOzet(); break;
  }
  bindEvents();
}

function progressBar(){ return `<div class="k-progress"><div class="k-progress-fill" style="width:${progressPct()}%"></div></div>`; }

function backBtn(){ return `<button class="back-btn" id="k-geri"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Geri</button>`; }

function devamBtn(aktif, lbl="DEVAM →"){ return `<button class="k-devam${aktif?" aktif":""}" id="k-devam">${lbl}</button>`; }

/* ── EKRANLAR ───────────────────────────────────────── */
function rKat(){
  const opts = KAT.map((k,i)=>`
    <button class="choice-btn b${i+1}${S.katId===k.id?" selected":""}" data-kat="${k.id}">
      <div class="btn-icon">${k.ikon}</div>
      <div class="btn-text">
        <div class="btn-main">${k.label}</div>
      </div>
      <span class="btn-arrow">›</span>
    </button>`).join("");
  return `<div class="k-top">${progressBar()}
    <div class="k-step-lbl">Adım 1 — Sorun</div>
    <div class="k-title">Ne sorunu var?</div>
    <div class="k-btn-list">${opts}</div>
  </div>
  <div class="k-bot">${devamBtn(!!S.katId)}</div>`;
}

function rAlt(){
  const k = katObj();
  const opts = (k?.altlar||[]).map((a,i)=>`
    <button class="choice-btn b${i+1}${S.alt===a?" selected":""}" data-alt="${a}">
      <div class="btn-text"><div class="btn-main">${a}</div></div>
      <span class="btn-arrow">›</span>
    </button>`).join("");
  const hint = S.alt ? `<div class="k-hint">Bu sorun sık görülüyor.</div>` : "";
  const warn = S.alt&&k?.uyari?.[S.alt] ? `<div class="k-warn">${k.uyari[S.alt]}</div>` : "";
  return `<div class="k-top">${backBtn()}${progressBar()}
    <div class="k-step-lbl">Adım 2 — Belirti</div>
    <div class="k-title">Ne oluyor tam olarak?</div>
    <div class="k-btn-list">${opts}</div>
    ${hint}${warn}
  </div>
  <div class="k-bot">${devamBtn(!!S.alt)}</div>`;
}

function rBag(idx){
  const k = katObj();
  const bag = k?.baglamlar?.[idx];
  if(!bag){ S.faz=sonrakiFaz(idx===0?"bag0":"bag1"); render(); return ""; }
  const opts = bag.sec.map((s,i)=>`
    <button class="choice-btn b${i+1}${S.bc[idx]===s?" selected":""}" data-bag="${idx}" data-val="${s}">
      <div class="btn-text"><div class="btn-main">${s}</div></div>
      <span class="btn-arrow">›</span>
    </button>`).join("");
  const adim = idx===0?3:4;
  return `<div class="k-top">${backBtn()}${progressBar()}
    <div class="k-step-lbl">Adım ${adim} — Bağlam</div>
    <div class="k-title">${bag.soru}</div>
    <div class="k-btn-list">${opts}</div>
  </div>
  <div class="k-bot">${devamBtn(!!S.bc[idx])}</div>`;
}

function rBolge(){
  const opts = BOLGE.map((b,i)=>`
    <button class="choice-btn b${i+1}${S.bolge===b.kod?" selected":""}" data-bolge="${b.kod}">
      <div class="btn-icon" style="font-size:11px;font-weight:700;color:#3B82F6;background:rgba(37,99,235,0.08)">${b.kod}</div>
      <div class="btn-text"><div class="btn-main">${b.label}</div></div>
      <span class="btn-arrow">›</span>
    </button>`).join("");
  return `<div class="k-top">${backBtn()}${progressBar()}
    <div class="k-step-lbl">Bölge</div>
    <div class="k-title">Hangi bölgedesiniz?</div>
    <div class="k-btn-list">${opts}</div>
  </div>
  <div class="k-bot">${devamBtn(!!S.bolge)}</div>`;
}

function rAcil(){
  const opts = ACILIYET.map((a,i)=>`
    <button class="time-btn t${i+1}${S.acil===a.id?" selected":""}" data-acil="${a.id}">
      <div class="time-icon">${a.ikon}</div>
      <div class="time-label">${a.label}</div>
      <div class="time-sub">${a.sub}</div>
    </button>`).join("");
  return `<div class="k-top">${backBtn()}${progressBar()}
    <div class="k-step-lbl">Zaman</div>
    <div class="k-title">Ne zaman çözülmesini istiyorsunuz?</div>
    <div class="time-grid">${opts}</div>
  </div>
  <div class="k-bot">${devamBtn(!!S.acil,"ÖZET →")}</div>`;
}

function rOzet(){
  const k=katObj(), b=bolgeObj(), a=acilObj();
  const bagSatir = S.bc.filter(Boolean).map((c,i)=>{
    const soru = k?.baglamlar?.[i]?.soru||"";
    return `<div class="k-ozet-row"><span class="k-ozet-lbl">${soru}</span><span class="k-ozet-val">${c}</span></div>`;
  }).join("");
  const kn = kokNeden();
  return `<div class="k-top">
    <div class="k-talep-no">${S.talepNo}</div>
    <div class="k-ozet-row"><span class="k-ozet-lbl">Sorun</span><span class="k-ozet-val">${k?.label||""}</span></div>
    <div class="k-ozet-row"><span class="k-ozet-lbl">Belirti</span><span class="k-ozet-val">${S.alt||""}</span></div>
    ${bagSatir}
    <div class="k-ozet-row"><span class="k-ozet-lbl">Bölge</span><span class="k-ozet-val">${b?b.kod+" / "+b.label:""}</span></div>
    <div class="k-ozet-row"><span class="k-ozet-lbl">Aciliyet</span><span class="k-ozet-val">${a?.label||""}</span></div>
    <div class="k-ozet-row"><span class="k-ozet-lbl">Saat</span><span class="k-ozet-val">${S.saat}</span></div>
    ${kn?`<div class="k-kok">Şüphe: ${kn}</div>`:""}
    <div class="k-status">
      <span class="on">Talep alındı</span><span class="sep">→</span>
      <span class="off">İnceleniyor</span><span class="sep">→</span>
      <span class="off">Dönüş planlandı</span>
    </div>
  </div>
  <div class="k-bot">
    <a class="k-wa" href="https://wa.me/${WA}?text=${waMsg()}" target="_blank">WhatsApp'a Gönder ↗</a>
    <button class="k-sheets" id="k-sheets">Google Sheets satırını kopyala</button>
    <div class="k-note">No · Saat · Bölge · Sorun · Belirti · Bağlam · Sistem · Aciliyet · Şüphe · Durum</div>
    <button class="k-yeni" id="k-yeni">Yeni kayıt →</button>
  </div>`;
}

/* ── EVENT BINDING ───────────────────────────────────── */
function bindEvents(){
  const $ = id=>document.getElementById(id);

  $("k-geri")?.addEventListener("click",()=>{
    const p=oncekiFaz(S.faz);
    if(!p){ showScreen('screen1'); return; }
    S.faz=p; render();
  });

  $("k-devam")?.addEventListener("click",()=>{
    const hazir={kat:!!S.katId,alt:!!S.alt,bag0:!!S.bc[0],bag1:!!S.bc[1],bolge:!!S.bolge,acil:!!S.acil};
    if(!hazir[S.faz]) return;
    S.faz=sonrakiFaz(S.faz); render();
  });

  $("k-sheets")?.addEventListener("click",()=>{
    navigator.clipboard.writeText(sheetsRow()).then(()=>{
      const b=$("k-sheets"); if(!b) return;
      b.textContent="✓ kopyalandı — Sheets'e yapıştır"; b.classList.add("ok");
      setTimeout(()=>{ b.textContent="Google Sheets satırını kopyala"; b.classList.remove("ok"); },2500);
    });
  });

  $("k-yeni")?.addEventListener("click",()=>{
    showScreen('screen1');
    document.getElementById('k-inner').innerHTML="";
  });

  document.querySelectorAll("[data-kat]").forEach(el=>el.addEventListener("click",()=>{
    S.katId=el.dataset.kat; S.alt=null; S.bc=[]; render();
  }));
  document.querySelectorAll("[data-alt]").forEach(el=>el.addEventListener("click",()=>{
    S.alt=el.dataset.alt; render();
  }));
  document.querySelectorAll("[data-bag]").forEach(el=>el.addEventListener("click",()=>{
    const idx=parseInt(el.dataset.bag); S.bc[idx]=el.dataset.val; render();
  }));
  document.querySelectorAll("[data-bolge]").forEach(el=>el.addEventListener("click",()=>{
    S.bolge=el.dataset.bolge; render();
  }));
  document.querySelectorAll("[data-acil]").forEach(el=>el.addEventListener("click",()=>{
    S.acil=el.dataset.acil; render();
  }));
}
</script>

</body>
</html>
